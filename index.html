<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="author" content="Faran Najam">
<meta name="copyright" content="© 2026 Faran Najam. All rights reserved.">
<meta name="description" content="Claude Code for PMs — a free course by Faran Najam. Free to learn from, not to republish or sell.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code for PMs — The craft is evolving</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap');

:root {
  --blue:#236CFF; --blue-dark:#1450CC; --blue-light:#EBF1FF; --blue-mid:#C5D7FF; --blue-dim:rgba(35,108,255,0.08);
  --bg:#F5F6FA; --white:#FFFFFF; --surface:#FFFFFF; --surface2:#F0F2F8;
  --border:#DDE1EE; --border-dark:#C4CADC;
  --text:#1A1F36; --text-mid:#4A5068; --muted:#8C93A8; --muted-light:#B8BDD0;
  --green:#0B8A4C; --green-light:#E6F5EE;
  --amber:#C47B00; --amber-light:#FFF3DC;
  --red:#D93025; --red-light:#FDECEA;
  --purple:#6B4EFF; --purple-light:#F0EEFF;
  --teal:#0F6E56; --teal-light:#E1F5EE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito Sans','Avenir Next',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* SHELL */
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:272px;min-width:272px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10}
.sidebar::before{content:'';display:block;height:3px;background:var(--blue);flex-shrink:0}
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.logo-course-title{font-size:15px;font-weight:800;color:var(--text);line-height:1.25;letter-spacing:-0.01em}
.logo-sub{margin-top:4px;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.progress-bar-wrap{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.04em}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#5B9AFF);border-radius:2px;transition:width 0.4s ease}
.parts-nav{flex:1;overflow-y:auto;padding:4px 0 16px}
.part-group{}
.part-header{padding:9px 20px 8px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background 0.12s;user-select:none}
.part-header:hover{background:var(--blue-dim)}
.part-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--blue);font-weight:600;letter-spacing:0.08em;min-width:18px;text-transform:uppercase}
.part-name{font-size:12px;font-weight:700;color:var(--text-mid);flex:1;line-height:1.3}
.part-chevron{color:var(--muted-light);font-size:9px;transition:transform 0.18s}
.part-group.open .part-chevron{transform:rotate(90deg)}
.lessons-list{display:none;border-bottom:1px solid var(--border)}
.part-group.open .lessons-list{display:block}
.lesson-item{padding:6px 20px 6px 46px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);line-height:1.3;transition:all 0.12s;border-left:2px solid transparent}
.lesson-item:hover{background:var(--blue-dim);color:var(--text)}
.lesson-item.active{background:var(--blue-light);color:var(--blue-dark);border-left-color:var(--blue);font-weight:700}
.lesson-item.done{color:var(--green)}
.lesson-item.done .lesson-dot{background:var(--green)}
.lesson-dot{width:5px;height:5px;border-radius:50%;background:var(--border-dark);min-width:5px;flex-shrink:0}
.lesson-item.active .lesson-dot{background:var(--blue)}
.sidebar-nav-links{padding:12px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.nav-link{font-size:12px;font-weight:600;color:var(--muted);padding:7px 10px;border-radius:6px;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:8px}
.nav-link:hover{background:var(--blue-dim);color:var(--blue)}
.nav-link.active{background:var(--blue-light);color:var(--blue-dark)}
.nav-link-icon{font-size:14px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:5}
.breadcrumb{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.breadcrumb-sep{color:var(--muted-light)}
.breadcrumb-current{color:var(--blue);font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:700;padding:8px 18px;border-radius:6px;border:none;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em}
.btn-ghost{background:transparent;color:var(--text-mid);border:1.5px solid var(--border-dark)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(35,108,255,0.25)}
.btn-primary:hover{background:var(--blue-dark);transform:translateY(-1px)}

/* CONTENT */
.content-wrap{flex:1;padding:40px 44px 80px;max-width:860px}
.lesson-meta{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.lesson-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--blue);background:var(--blue-light);padding:4px 10px;border-radius:4px;text-transform:uppercase;border:1px solid var(--blue-mid)}
.lesson-num-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.lesson-badges{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em}
.badge-time{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.badge-easy{background:var(--green-light);color:var(--green)}
.badge-medium{background:var(--amber-light);color:var(--amber)}
.badge-advanced{background:var(--purple-light);color:var(--purple)}
h1{font-size:30px;font-weight:800;color:var(--text);line-height:1.18;margin-bottom:10px;letter-spacing:-0.025em;position:relative;padding-left:16px}
h1::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--blue);border-radius:2px}
.lesson-subtitle{font-size:15px;color:var(--text-mid);margin-bottom:32px;margin-left:16px;line-height:1.6;font-weight:400}
.section{margin-bottom:30px}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.concept-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:13px 15px;border-top:2px solid var(--blue-mid);transition:border-top-color 0.15s,box-shadow 0.15s}
.concept-card:hover{border-top-color:var(--blue);box-shadow:0 2px 12px rgba(35,108,255,0.1)}
.concept-name{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--blue-dark);margin-bottom:5px}
.concept-desc{font-size:12px;color:var(--muted);line-height:1.5;margin:0}
.example-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:10px}
.example-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px}
.example-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.example-side{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.example-side-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.example-side.before .example-side-label{color:var(--red)}
.example-side.after .example-side-label{color:var(--green)}
.example-content{font-size:12px;color:var(--text-mid);line-height:1.6;white-space:pre-wrap;font-family:'IBM Plex Mono',monospace}
.exercise-box{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:18px 22px;border-left:4px solid var(--blue);box-shadow:0 1px 4px rgba(35,108,255,0.07)}
.exercise-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--blue);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}
.exercise-text{color:var(--text);line-height:1.7;margin:0;font-size:14px}
.artifact-box{background:var(--amber-light);border:1px solid #F5D78A;border-radius:8px;padding:14px 18px;display:flex;align-items:flex-start;gap:12px}
.artifact-icon{font-size:18px;line-height:1;padding-top:2px}
.artifact-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--amber);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px}
.artifact-name{color:#7A5000;font-size:13px;font-weight:600;margin:0}
.prompt-block{background:#F8FAFF;border:1px solid var(--blue-mid);border-radius:8px;padding:16px 20px;margin:10px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);line-height:1.75;position:relative;white-space:pre-wrap;word-break:break-word}
.prompt-block::before{content:'STARTER PROMPT';display:block;font-size:9px;color:var(--blue);letter-spacing:0.14em;margin-bottom:10px;font-weight:600}
.copy-btn{position:absolute;top:12px;right:12px;background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:4px 9px;border-radius:4px;cursor:pointer;letter-spacing:0.08em;transition:all 0.12s}
.copy-btn:hover{background:var(--blue);color:#fff}
.quiz-section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px 22px}
.quiz-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.quiz-opt{padding:9px 14px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-mid);transition:all 0.12s;background:var(--surface2);font-weight:500}
.quiz-opt:hover{border-color:var(--blue);color:var(--blue-dark);background:var(--blue-light)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:700}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-feedback{font-size:13px;color:var(--muted);margin-top:8px;min-height:20px;line-height:1.5;font-weight:500}
.quiz-feedback.ok{color:var(--green)}
.quiz-feedback.err{color:var(--red)}
.complete-bar{background:var(--white);border-top:1px solid var(--border);padding:16px 44px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;bottom:0;box-shadow:0 -2px 8px rgba(0,0,0,0.06)}
.complete-hint{font-size:12px;color:var(--muted);font-weight:500}

/* HOME / LANDING */
.landing{max-width:860px}
.landing-hero{padding:56px 44px 40px;border-bottom:1px solid var(--border);background:var(--white);margin-bottom:0}
.landing-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;font-weight:600}
.landing-h1{font-size:44px;font-weight:900;color:var(--text);line-height:1.1;letter-spacing:-0.03em;margin-bottom:16px}
.landing-h1 em{font-style:normal;color:var(--blue)}
.landing-desc{font-size:16px;color:var(--text-mid);max-width:540px;line-height:1.7;margin-bottom:28px;font-weight:400}
.landing-cta-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:36px}
.landing-note{font-size:12px;color:var(--muted);margin-top:4px}
.differentiators{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:36px 44px;background:var(--surface2);border-bottom:1px solid var(--border)}
.diff-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.diff-icon{font-size:22px;margin-bottom:10px}
.diff-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px}
.diff-desc{font-size:12px;color:var(--muted);line-height:1.55}
.stats-strip{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--border)}
.stat{flex:1;padding:20px 0;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-size:26px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:3px;letter-spacing:-0.02em}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.section-heading{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin:0 44px 14px;font-family:'IBM Plex Mono',monospace;padding-top:36px}
.parts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 44px 80px}
.part-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden}
.part-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(35,108,255,0.12);transform:translateY(-2px)}
.part-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--blue);border-radius:2px 0 0 2px;opacity:0;transition:opacity 0.18s}
.part-card:hover::before{opacity:1}
.part-card-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue);font-weight:600;letter-spacing:0.1em;margin-bottom:6px;text-transform:uppercase}
.part-card h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.3}
.part-card p{font-size:12px;color:var(--muted);margin:0 0 10px;line-height:1.5}
.part-card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted-light)}

/* GETTING STARTED */
.gs-wrap{padding:40px 44px 80px;max-width:860px}
.gs-step{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:22px 24px;margin-bottom:14px;display:flex;gap:18px;align-items:flex-start}
.gs-num{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.gs-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px}
.gs-body{font-size:13px;color:var(--text-mid);line-height:1.65}
.gs-body code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--blue-dark)}
.gs-body a{color:var(--blue);text-decoration:none;font-weight:600}
.gs-body a:hover{text-decoration:underline}
.warning-box{background:var(--amber-light);border:1px solid #F5D78A;border-left:4px solid var(--amber);border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:14px}
.warning-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--amber);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px}
.warning-body{font-size:13px;color:#7A5000;line-height:1.6}
.safe-list{list-style:none;margin-top:8px}
.safe-list li{font-size:13px;color:#7A5000;padding:3px 0 3px 18px;position:relative}
.safe-list li::before{content:'×';position:absolute;left:0;color:var(--red);font-weight:700}
.safe-list li.ok::before{content:'✓';color:var(--green)}

/* PROMPT LIBRARY */
.pl-wrap{padding:40px 44px 80px;max-width:860px}
.pl-search{width:100%;padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--text);background:var(--white);margin-bottom:20px;outline:none;transition:border-color 0.15s}
.pl-search:focus{border-color:var(--blue)}
.pl-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.pl-filter{font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all 0.12s;color:var(--muted)}
.pl-filter:hover,.pl-filter.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}
.pl-group{margin-bottom:28px}
.pl-group-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.pl-group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.pl-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;flex-direction:column;gap:0;transition:border-color 0.12s}
.pl-card:hover{border-color:var(--blue-mid)}
.pl-card-text{flex:1}
.pl-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.pl-card-preview{display:none}
.pl-copy{background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:5px 10px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all 0.12s;flex-shrink:0}
.pl-copy:hover{background:var(--blue);color:#fff}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-dark)}

/* MOBILE */
@media(max-width:820px){
  .sidebar{width:0;min-width:0;position:fixed;transform:translateX(-100%);transition:transform 0.25s;z-index:100}
  .sidebar.open{width:272px;min-width:272px;transform:translateX(0)}
  .mobile-menu-btn{display:flex}
  .content-wrap,.gs-wrap,.pl-wrap{padding:24px 20px 80px}
  .landing-hero{padding:32px 20px 28px}
  .landing-h1{font-size:32px}
  .differentiators{grid-template-columns:1fr;padding:24px 20px}
  .parts-grid{grid-template-columns:1fr;padding:0 20px 60px}
  .section-heading{margin:0 20px 12px;padding-top:24px}
  .topbar{padding:12px 16px}
  .complete-bar{padding:14px 20px}
  .example-cols{grid-template-columns:1fr}
  .pl-wrap,.gs-wrap{padding:24px 20px 80px}
  .stats-strip{flex-wrap:wrap}
  .stat{min-width:50%}
  .landing-cta-row{flex-direction:column;align-items:flex-start}
}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text-mid)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99}
.mobile-overlay.open{display:block}

  /* COPYRIGHT FOOTER */
  .copyright-footer{
    background:var(--white);
    border-top:1px solid var(--border);
    padding:20px 44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .copyright-text{
    font-size:11px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    line-height:1.6;
  }
  .copyright-text a{color:var(--blue);text-decoration:none}
  .copyright-text a:hover{text-decoration:underline}
  .terms-banner{
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    padding:10px 44px;
    font-size:11px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .terms-banner strong{color:var(--text-mid)}
  @media(max-width:820px){
    .copyright-footer{padding:16px 20px}
    .terms-banner{padding:10px 20px}
  }

  .prompt-block.agent{background:#F0FFF8;border:1px solid #9FE1CB;border-left:3px solid #1D9E75}.prompt-block.agent::before{content:none}
  .prompt-block.agent .copy-btn{background:#E1F5EE;border-color:#9FE1CB;color:#0F6E56}
  .prompt-block.agent .copy-btn:hover{background:#1D9E75;color:#fff;border-color:#1D9E75}
  .pl-card[data-agent='1']{border-left:3px solid #1D9E75;background:#F9FFFE}
  .pl-card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;margin-bottom:10px}

const lessonExamples = {"p1l1": {"before": "Meeting notes from yesterday: john said something about latency, need to talk to design re the empty state, users confused follow up, Q3 goal still tbd, sarah has concerns", "after": "Problem Statement\\nUsers experiencing latency issues and confusion around empty states, impacting adoption.\\n\\nGoals\\n- Resolve latency concerns raised in eng sync\\n- Align with design on empty state treatment\\n\\nOpen Questions\\n- What is the Q3 adoption goal?\\n- What are Sarah concerns specifically?"}, "p1l2": {"before": "Every session you spend the first few minutes re-explaining the same context. What the product is, who the users are, where you are in the roadmap, what the key tensions are. Claude starts fresh every time.", "after": "# my-product/CLAUDE.md\\nProduct: [your product name]\\nRole: Staff PM\\nUsers: [your primary segments]\\nCurrent phase: Q3 planning\\nKey tension: Reliability vs. feature velocity\\nOpen decisions: Versioning strategy, tiering model\\n\\n[Claude reads this at session start. You never re-explain context again.]"}, "p1l3": {"before": "Starting a new Claude Code session on a decision you worked through last week. You remember the conclusion but not the reasoning. You search Slack for 20 minutes. You find the thread but the context is scattered across 40 messages.", "after": "change_log.md\\nDate: 2025-03-15\\nDecision: Prioritize reliability investment before next feature cycle\\nReason: Two enterprise customers flagged stability as a risk to renewal\\nOwner: PM\\nReversible: Yes — revisit in Q4 if risk resolves\\n\\n[Decision trail intact. New session, full context in seconds.]"}, "p1l4": {"before": "Every Friday: open Claude, explain the format you want, paste notes, fix the output, repeat next week with the same setup.", "after": "> Run my weekly-status skill\\n\\n[Claude reads SKILL.md, pulls from your notes, outputs a formatted update in 20 seconds]"}, "p2l1": {"before": "50+ interviews completed with a specific user segment. Notes scattered across a dozen docs. You went in expecting UX complaints. Instead you keep hearing something structural: bookkeepers use the product differently from everyone else. You do not know yet what that means for the product.", "after": "Theme: This segment has a fundamentally different job to be done\\nFrequency: High — consistent across interviews\\nKey insight: Bookkeepers are not using the product for themselves — they are using it on behalf of others. The current flow was never designed for that.\\nSo what: One user intent does not fit all. Product direction changed: we built a dedicated flow for this segment rather than continuing to optimize a universal experience that did not fit their context."}, "p2l2": {"before": "You have internal feedback — NPS, support tickets, survey responses. It takes weeks to synthesize and by the time it is ready the team has already moved on to the next sprint. You suspect there is a faster signal somewhere.", "after": "After layering public community feedback alongside internal NPS and support data:\\nTop theme: Users attributed friction to one part of the product — but the pattern across sources showed the real issue was at the handoff between systems, not in any single team ownership area\\nPattern: Users could not tell what broke or where to go for help\\nSo what: The internal data was showing symptoms. The public data showed the cause. Combining both gave a clearer picture faster than either alone."}, "p2l3": {"before": "Three competitors you need to brief leadership on. You have tabs open from three different months, notes in two different docs, and a vague memory that one of them just changed their pricing model.", "after": "Competitor matrix: three players in the same space\\nFor each: core features, pricing model, target customer, recent changes\\nGap identified: None of them communicate system status to end users during failures — they all fail silently\\nTime: 25 minutes to build, ready for the leadership meeting"}, "p2l4": {"before": "You have synthesized the bookkeeper interviews and a clear pattern has emerged: this segment uses the product in a way the current flow does not support. That changes what needs to be built. But the platform mandate is to serve all segments consistently. You need a decision to go in a different direction.", "after": "Decision Brief: Dedicated flow for bookkeeper segment\\nSituation: Bookkeepers represent a significant portion of the user base but operate in a context the current flow was not designed for.\\nFinding: This segment fails at a materially higher rate than others. The fix requires a purpose-built flow, not a copy or instruction change.\\nOptions: (A) Build a dedicated flow (B) Add contextual guidance to the existing flow (C) Treat as out of scope\\nRecommendation: Option A. Clear segment need, measurable outcome, scoped investment.\\nResult: Shipped. Meaningful improvement in conversion and task completion rates for this segment."}, "p3l1": {"before": "You describe a feature in a meeting. Design says they will mock it up next sprint. By the time it is ready the team has moved on and the feedback is stale.", "after": "You write a precise brief: user, context, job to be done, success condition. Claude builds a working prototype in 20 minutes. You share it in Slack that afternoon. Feedback arrives before the meeting ends."}, "p3l2": {"before": "You run a usability study. Recruiting takes 2 weeks. The prototype is already out of date. The report comes back 10 days later. By then the sprint is locked.", "after": "Monday 9am: prototype v1 shared with 3 users. Feedback captured in structured notes. Claude updates the prototype and synthesizes patterns by noon. Monday 2pm: prototype v2 tested with 3 more users. Two rounds of learning in one day. Hypothesis formed by end of day."}, "p3l3": {"before": "Three rounds of testing done. Lots of notes. Team meeting tomorrow. You are not sure what you learned or what to build. The meeting becomes a debate about opinions rather than a review of evidence.", "after": "Three rounds synthesized: the core flow is validated, one interaction pattern consistently confused users, one assumption was wrong. Hypothesis formed: changing the information hierarchy at step 2 will reduce drop-off. Spec written from the prototype, not from scratch. Eng picks it up with context already baked in."}, "p3l4": {"before": "Sprint planning. PM describes a feature verbally. Design needs a week to mock it up. Eng estimates based on the verbal description. Three weeks later the first working version looks nothing like what anyone imagined.", "after": "PM brings a working prototype to sprint planning. Design reacts to interaction patterns, not a description of them. Eng sees the intended behavior before writing a line of code. Estimate is grounded in something real. First production version is much closer to the intent. Revision cycle shrinks."}, "p4l1": {"before": "Engineer: the issue is in the OAuth token refresh handler in the auth middleware.\\nYou: got it. (You have no idea what that means or where to look.)", "after": "You: I looked at /src/auth/middleware.js — it looks like the token refresh only runs on page load, not on API calls. Is that what is causing the session drops?\\nEngineer: Exactly. You got it."}, "p4l2": {"before": "You are a platform PM. Your eng team builds capabilities that three different offering teams depend on. Each offering team has their own PM who also wants status. Your tech lead is fielding questions from four directions and producing for none of them.", "after": "You own the communication layer. One async update per week, written clearly enough that all three offering teams get what they need without going directly to eng. Tech lead gets one decision per sprint pre-framed with options and your recommendation. Eng velocity increases. Your tech lead stops fielding the same question from three different Slack threads."}, "p4l3": {"before": "You are standardizing the connection UX across three products that have drifted apart over years. Design shows you three sets of comps. You have opinions based on instinct, not the bookkeeper interviews you just finished.", "after": "Feedback structured before the design review:\\nWhat research supports: This segment needs to see status information earlier in the flow — the comp addresses that well\\nSpecific concern: The error state uses red text only. 15% of users are colorblind and this is a high-stakes surface. Can we add an icon?\\nSigning off on: The overall flow sequence and the reconnect pattern\\nNot signing off yet: Error states across all three surfaces until we align on an accessibility standard\\nThe designer had something concrete to act on. Review took 25 minutes instead of 90."}, "p4l4": {"before": "PM clicks through the happy path. Looks good. Ships. Three hours later a support ticket: what happens if I upload a file with a comma in the filename? Nobody thought of that.", "after": "Claude generates 23 edge cases from the spec. PM tests 10 of them. Finds 2 bugs. They are fixed before launch. Support ticket never arrives."}, "p5l1": {"before": "You need to answer a product question that requires joining three data tables. You have not written SQL in years. Asking the data team means a 3-day wait and you need this before tomorrow.", "after": "You describe the question to Claude in plain English. It writes the query, you run it, and in 15 minutes you have the answer: a small segment of your traffic is dramatically underperforming the rest. The problem is not product quality — it is routing and distribution. That single query changed the roadmap priority."}, "p5l2": {"before": "A top-line success metric that has held steady for years. Leadership is confident. But when a team ships something, they cannot tell if the metric moved because of their work or despite it. The signal is real — the resolution is not.", "after": "Metric tree built underneath the top-line rate. Decomposed into the independent forces that drive it: coverage, flow completion by segment, lifecycle health, and session behavior. The top-line stays as the north star. Underneath it: faster, more specific indicators — each tied to a lever a team can actually pull. Now when something ships, the team can see which component moved and whether it held. The top-line metric got more meaningful, not replaced."}, "p5l3": {"before": "You have done the decomposition. You know which operating metrics explain the top-line. But getting three separate teams to adopt a shared measurement framework is not a small ask — and showing up with a deck of new metrics is not a recommendation anyone can act on.", "after": "Memo: Introduce operating metrics to give our top-line more signal and more levers.\\nRecommendation: Adopt a small set of leading indicators alongside the top-line — each one explains a different driver of it.\\nStrongest objection: We already have a metric. Why add more?\\nResponse: The top-line tells us where we are. The operating metrics tell us why we are there and what to do next. They make the existing metric more powerful, not redundant.\\nConfidence: High. Early cuts show the new indicators already explain recent movements in the top-line.\\nDecision needed: Before planning so teams can set roadmaps against the right levers."}, "p5l4": {"before": "Your team runs 1-2 experiments per month. Half do not reach significance before someone calls the result. The other half get shipped on instinct. You are rolling out a new experimentation platform and need teams to actually trust what it tells them.", "after": "First experiment on the new platform: Apple Pay and Google Wallet integration at checkout. Sample size calculated upfront. Runtime committed before launch. Result: +8% conversion, statistically significant. Shipped with confidence.\\nSix months later: 6+ experiments running per month across 25 product teams. The shift was not the tool — it was designing the test before running it. Once teams committed to a sample size in advance, they stopped calling results early."}, "p6l1": {"before": "You need a PRD for a platform capability that touches multiple systems, multiple teams, and multiple user segments. The standard feature template has none of the right sections. You spend two hours on structure before writing a word of substance.", "after": "> Run PRD skill for [platform capability]\\n\\n[Claude reads your CLAUDE.md, understands the platform context and user segments. Generates a PRD with sections that fit a platform capability: problem framing, affected surfaces, success metrics by segment, rollout sequence, open questions by team. You start with substance, not structure.]"}, "p6l2": {"before": "You send a doc proposing a new operating metrics framework to sit alongside the top-line connection rate. The argument feels solid. Then in the review the VP of Engineering asks: if we add three new metrics, how do we stop teams from optimizing for the easy one and ignoring the hard ones? You did not have an answer ready.", "after": "Before sending: you run the doc through Claude as your VP of Engineering. It surfaces the gaming concern immediately. You add a section on how the metrics relate — they are components of the top-line, not independent targets, so optimizing one at the expense of another shows up in the composite. You run it as an offering team PM whose roadmap is already locked. Their objection: my team cannot absorb new measurement overhead mid-quarter. You add a phased adoption appendix. The actual review takes 20 minutes. Both objections come up. Both are already answered."}, "p6l3": {"before": "You are mid-platform migration. Signal is scattered — adoption in one dashboard, escalations in another, eng velocity in Jira, churn risk in Salesforce. Leadership wants a weekly update and you are starting from four different tools.", "after": "Raw input pasted Friday at 4pm: adoption numbers, this week escalations, two accounts flagged as at-risk, three capabilities shipped.\\nOutput 90 seconds later:\\nShipped: Core capability now live across all surfaces\\nIn Progress: Top migration milestones on track for next week\\nBlockers: Two accounts flagged at-risk — need outreach before Thursday\\nNext Week: Targeting next adoption milestone\\nLeadership read it in 3 minutes. One action item. Weekend intact."}, "p6l4": {"before": "12-slide deck. Slide 3: a chart with 8 lines and no title. Slide 7: a table with 40 rows. The audience reads the slides. You are not needed.", "after": "8-slide deck. Every slide has one point. The chart has one line highlighted. The table has 3 rows. The audience listens to you. You are the story."}, "p7l1": {"before": "Four projects. Each in a different folder with different naming. Some have CLAUDE.md, some do not. Skills scattered across the desktop. New session means starting from scratch.", "after": "One workspace. Every project has a CLAUDE.md. Skills live in /skills. Three commands, and Claude knows your entire context for the day."}, "p7l2": {"before": "Sprint planning prep: pull tickets from Jira, copy into Notion, write context for each, estimate effort, share with team. 2 hours every other week.", "after": "> Run sprint-prep workflow\\n\\n[Claude pulls tickets, adds context from strategy.md, estimates effort, formats for Notion]\\nTime: 8 minutes."}, "p7l3": {"before": "You run the same research synthesis every Monday, the same competitive check every quarter, the same status update every Friday. Each one takes 20-30 minutes. You do them manually because that is how the workflow was built.", "after": "Monday 8am: feedback digest waiting in Slack. Competitive changes digest waiting in your inbox. Friday 4pm: status update draft saved to your workspace, ready for your review. You did not trigger any of it. You just reviewed, adjusted where needed, and sent. 90 minutes of weekly manual work converted to 10 minutes of review."}, "p7l4": {"before": "You tell your team about Claude Code in a meeting. They nod. Two weeks later nobody has set it up. The idea dies.", "after": "You run a 15-minute demo on a problem your teammate is currently stuck on. They see it solve something real. They set it up that afternoon."}, "p8l1": {"before": "Every morning you open three dashboards, check the same metrics, compare to last week in your head, decide whether anything is worth investigating. 15 minutes every day, 5 days a week. Most days nothing has changed.", "after": "8am: Slack message from your pulse agent. Two metrics normal. One flagged — conversion dropped 12% vs 7-day average, outside the 8% threshold you set. Hypothesis attached: likely the auth change deployed yesterday. You investigate. The rest of your morning is uninterrupted."}, "p8l2": {"before": "Friday 4pm. You need to send a weekly update. You open four tabs — data warehouse, Jira, NPS dashboard, last week email. You spend 45 minutes assembling a picture of the week that everyone already mostly knows.", "after": "Friday 4pm: a Slack message appears in your team channel. Four bullets. What shipped, what moved, what to watch next week. Full report linked. You glance at it, make one edit, and leave for the weekend. The agent wrote it. You approved it."}, "p8l3": {"before": "Monday morning: someone on your team messages you — retention looks weird this week. You spend two hours pulling queries, building a metric tree, generating hypotheses, and working out which data check to run first.", "after": "Monday morning: you wake up to a Slack alert from Sunday night. Retention dropped 9% vs baseline — outside the 7% threshold. Attached: metric tree showing new user retention drove the drop, 3 ranked hypotheses, and the exact SQL to confirm the top one. You run the query. Confirmed in 4 minutes. Fix scoped before standup."}, "p8l4": {"before": "Four agents running. You think. You are not entirely sure which ones are still active, what they are watching, or whether the one that was pulling from Jira last month is still working after the API key rotated.", "after": "Agent registry: 4 agents documented, each with schedule, data sources, output location, and failure behavior. Weekly health check prompt run every Monday — all green. When the Jira token rotated, the status update agent failed loudly rather than silently, and the registry told you exactly what to fix."}};

      {id:'p2l4',num:'2.4',time:'35 min',difficulty:'medium',

        subtitle:'Combine everything you have learned into one brief leadership can act on.',
        concepts:[
          {name:'Evidence Hierarchy',desc:'Ranking sources by how much weight they should carry'},
          {name:'Brief Structure',desc:'Situation → Findings → Options → Recommendation'},
          {name:'One Page Rule',desc:'One page forces clarity; two pages invites debate'},
          {name:'Recommendation Framing',desc:'How to phrase a recommendation so it generates a decision, not a discussion'}
        ],
        exercise:'Take outputs from lessons 2.1–2.3. Ask Claude to synthesize them into a 1-page decision brief with: situation, findings, options, and a clear recommendation.',
        prompts:['I have these research outputs: [paste]. Please synthesize into a 1-page decision brief: Situation (2 sentences), Key Findings (max 5 bullets), Options Considered (2-3), Recommended Action (1 sentence), Why Now. Audience: my VP of Product.'],
        artifact:'A 1-page decision brief ready to send',
        quiz:{q:'What separates a decision brief from a research report?',opts:['Length','A brief ends with a specific recommended action — a report just presents findings','Formatting','The audience'],correct:1,explain:'Research reports inform. Decision briefs drive action. The test: after reading it, does the stakeholder know exactly what you are recommending they do?'}
      }
    ]
  },
  {
    id:'p3',num:'P3',title:'Build and Learn Fast',
    subtitle:'Go from idea to working product in hours — and iterate with real users before writing a line of production code',
    lessons:[
      {id:'p3l1',num:'3.1',time:'40 min',difficulty:'medium',
        title:'The PM Brief: From Problem to Working Prototype',
        subtitle:'The quality of what Claude builds is determined by the quality of your brief. This lesson is about writing briefs that produce something worth testing.',
        concepts:[
          {name:'The PM Brief',desc:'A precise problem description that gives Claude enough context to build the right thing — not just a thing'},
          {name:'User + Context + Constraint',desc:'The three inputs that separate a good brief from a vague one'},
          {name:'0 to 1',desc:'Going from no artifact to a working, clickable prototype in a single session'},
          {name:'Brief Iteration',desc:'When the first prototype is wrong, the brief was wrong — how to diagnose and fix it'}
        ],
        example:{before:'You describe a feature in a meeting. Design says they will mock it up next sprint. By the time it is ready the team has moved on and the feedback is stale.',after:'You write a precise brief: user, context, job to be done, what success looks like in the flow. Claude builds a working prototype in 20 minutes. You share it in Slack that afternoon. Feedback arrives before the meeting ends.'},
        exercise:'Pick a feature you have been thinking about but have not built yet. Write a PM brief — user, context, job to be done, and success condition. Ask Claude to build a working HTML prototype from it. If the first version is wrong, diagnose whether the brief was wrong and rewrite it. Get to something worth showing a user.',
        prompts:['I want to build a working prototype. Here is my PM brief:\n\nUser: [describe who this is for and their context]\nJob to be done: [what they are trying to accomplish]\nFlow: [describe each step]\nSuccess condition: [what does good look like at the end]\nConstraints: [anything Claude should know — mobile only, simple, no login, etc]\n\nBuild an HTML prototype I can open in a browser and share with users today.'],
        artifact:'A working prototype built from a precise PM brief — and the brief itself as a reusable template',
        quiz:{q:'What most determines the quality of a Claude-generated prototype?',opts:['The complexity of the feature','The quality of the PM brief — the precision of the problem description','How much time you spend prompting','Whether you use HTML or React'],correct:1,explain:'Claude builds what you describe. Vague brief, vague prototype. The PM brief is the real skill — the prototype is just the output.'}
      },
      {id:'p3l2',num:'3.2',time:'50 min',difficulty:'medium',
        title:'Rapid Iterative Testing: 1 to 1.n in a Day',
        subtitle:'Run multiple rounds of user feedback on a working prototype — updating between sessions — and compress weeks of iteration into hours.',
        concepts:[
          {name:'1 to 1.n',desc:'Running multiple rapid iteration cycles on a working prototype before writing production code'},
          {name:'Lightweight Usability Sessions',desc:'15-minute sessions with real users that produce actionable signal — not a formal study'},
          {name:'Structured Feedback Capture',desc:'Capturing what you observe in a format Claude can synthesize across rounds'},
          {name:'Between-Session Updates',desc:'Using Claude to update the prototype between sessions so each round tests something new'}
        ],
        example:{before:'You run a usability study. Recruiting takes 2 weeks. The prototype is already out of date. The report comes back 10 days later. By then the sprint is locked.',after:'Monday 9am: prototype v1 shared with 3 users. Feedback captured in structured notes. Claude updates the prototype and synthesizes patterns by noon. Monday 2pm: prototype v2 tested with 3 more users. Two rounds of learning in one day. Hypothesis formed by end of day.'},
        exercise:'Take the prototype from lesson 3.1. Identify 3 people you can show it to today — a teammate, a customer, anyone who represents the user. Run a 15-minute session with each. Capture structured observations. Ask Claude to synthesize patterns across the three sessions and update the prototype. Run one more round with the updated version.',
        prompts:['I just ran [N] usability sessions on my prototype. Here are my structured observations from each session:\n\n[paste session notes]\n\nPlease: (1) identify the top 3 patterns across all sessions, (2) separate observations about the flow from observations about the UI, (3) flag anything users did that surprised you, (4) recommend the highest-impact change for the next prototype version, (5) update the prototype with that change.'],
        artifact:'A prototype updated across multiple test rounds and a synthesis document showing what changed and why',
        quiz:{q:'What makes rapid iterative testing different from a standard usability study?',opts:['It is less rigorous','It is faster because you skip synthesis','You update the prototype between rounds and test again — the loop closes in hours, not weeks','You need fewer participants'],correct:2,explain:'The power is in the loop. Each round informs the next. By the time you form a hypothesis you have evidence from multiple iterations, not just one session.'}
      },
      {id:'p3l3',num:'3.3',time:'35 min',difficulty:'medium',
        title:'When to Stop Iterating — Forming a Hypothesis Worth Shipping',
        subtitle:'How to recognize the point of diminishing return, synthesize what you learned, and translate it into a hypothesis you can ship and measure.',
        concepts:[
          {name:'Diminishing Return Signal',desc:'How to recognize when additional iteration rounds are producing noise, not signal'},
          {name:'Learning Synthesis',desc:'Combining observations across multiple rounds into a coherent picture of what users need'},
          {name:'The Hypothesis Statement',desc:'A specific, testable prediction about what will happen when you ship — and how you will measure it'},
          {name:'From Prototype to Spec',desc:'What the prototype and test rounds tell eng and design before a line of production code is written'}
        ],
        example:{before:'Three rounds of testing done. Lots of notes. Team meeting tomorrow. You are not sure what you learned or what to build. The meeting becomes a debate about opinions rather than a review of evidence.',after:'Three rounds synthesized: the core flow is validated, one interaction pattern consistently confused users, one assumption was wrong. Hypothesis formed: changing the information hierarchy at step 2 will reduce drop-off. Spec written from the prototype, not from scratch. Eng picks it up with context already baked in.'},
        exercise:'Take the feedback and iterations from lesson 3.2. Ask Claude to synthesize everything across all rounds into a single learning document. Identify where you have confidence and where you do not. Write a hypothesis statement for what you will ship. Decide: what does success look like in the data after you ship it?',
        prompts:['Here are my notes and observations from [N] rounds of prototype testing:\n\n[paste all session notes and iteration decisions]\n\nPlease: (1) synthesize the top 3 things we learned with confidence, (2) identify what we still do not know, (3) draft a hypothesis statement in the format: we believe [change] will result in [outcome] because [evidence], (4) list what this prototype tells eng and design that a spec written from scratch would not.'],
        artifact:'A learning synthesis document and a hypothesis statement ready to hand to the triad',
        quiz:{q:'How do you know when to stop iterating and ship?',opts:['When you run out of time','When the team agrees the prototype looks good','When additional rounds are producing the same observations and you have a clear hypothesis you can measure','When eng says they are ready'],correct:2,explain:'You stop when you are learning less with each round and you have a specific, testable prediction about what will happen when you ship. That is the signal that iteration has done its job.'}
      },
      {id:'p3l4',num:'3.4',time:'45 min',difficulty:'advanced',
        title:'Vibe Coding with Your Triad — PM as Catalyst',
        subtitle:'How to use Claude-generated prototypes as a shared working surface for design and engineering — collapsing the brief-to-build cycle from weeks to hours without losing alignment.',
        concepts:[
          {name:'PM as Catalyst',desc:'The PM role in vibe coding is not to build everything alone — it is to produce a working artifact that collapses the abstraction gap for design and eng'},
          {name:'Shared Working Surface',desc:'A prototype everyone can react to in the same room — faster than a PRD, more concrete than a wireframe'},
          {name:'Design Handoff',desc:'What design needs from a Claude prototype to take it further — and what they do not need to rebuild from scratch'},
          {name:'Eng Handoff',desc:'How a prototype changes the eng conversation — from estimating an abstraction to reacting to something real'},
          {name:'Guardrails',desc:'What vibe coding is not — when to slow down, when to stop, and when production code needs to be written properly'}
        ],
        example:{before:'Sprint planning. PM describes a feature verbally. Design needs a week to mock it up. Eng estimates based on the verbal description. Three weeks later the first working version looks nothing like what anyone imagined. Two more weeks of revision.','after':'PM brings a working prototype to sprint planning. Design reacts to interaction patterns, not a description of them. Eng sees the intended behavior before writing a line of code. Estimate is grounded in something real. First production version is much closer to the intent. Revision cycle shrinks.'},
        exercise:'Take the prototype and hypothesis from lessons 3.1-3.3. Bring it into a working session with your designer and tech lead. Have design identify what they would change and what they can build from. Have eng identify what the prototype tells them about scope and feasibility. Update the prototype based on their input. Document what each triad member now knows that they did not know before the session.',
        prompts:['I have a working prototype that has been through [N] rounds of user testing. I am about to share it with my designer and tech lead. Please help me prepare:\n(1) A brief framing for the designer — what the prototype is trying to solve, what we learned from users, and what I want their reaction on\n(2) A brief framing for the tech lead — what the prototype is showing, what the open technical questions are, and what I need from them before we write a spec\n(3) A list of decisions this session should produce so we leave with alignment, not more questions'],
        artifact:'A triad session plan and a post-session alignment doc — decisions made, open questions resolved, next steps owned',
        quiz:{q:'What is the PM role in vibe coding with the triad?',opts:['To build the entire product alone using Claude','To write all the code and hand it to eng to clean up','To produce a working artifact that collapses the abstraction gap — giving design and eng something real to react to instead of a description','To replace the need for design and engineering'],correct:2,explain:'Vibe coding is not about PMs replacing their triad. It is about using Claude to produce a working artifact fast enough that design and eng can react to something real — which is faster, more aligned, and more accurate than building from a verbal description or a static spec.'}
      }
    ]
  },
  {
    id:'p4',num:'P4',title:'Work with Your Team',
    subtitle:'The PM is not a solo operator — this part teaches how you work with engineering and design across the full delivery cycle',
    lessons:[
      {id:'p4l1',num:'4.1',time:'30 min',difficulty:'easy',
        title:'Reading a Codebase Without Writing Code',
        subtitle:'Navigate a real codebase and understand what it does — no prior experience needed.',
        concepts:[
          {name:'File Structure',desc:'How codebases are organized and what each folder signals'},
          {name:'Code as a Map',desc:'Reading for intent and structure, not syntax'},
          {name:'Plain-English Tours',desc:'Asking Claude to explain any file in language you can use'},
          {name:'Data Models',desc:'What the database schema tells you about product decisions made long ago'}
        ],
        example:{before:'Engineer: the issue is in the OAuth token refresh handler in the auth middleware.\nYou: got it. (You have no idea what that means or where to look.)',after:'You: I looked at /src/auth/middleware.js — it looks like the token refresh only runs on page load, not on API calls. Is that what is causing the session drops?\nEngineer: Exactly. You got it.'},
        exercise:'Clone a public open-source project. Ask Claude to give you a PM-level tour: what it does, how it is organized, where the key user-facing features live.',
        prompts:['I have cloned this repo. Give me a PM-level tour: (1) what this product does in one sentence, (2) how the codebase is organized — key folders and what they contain, (3) where the main user-facing features are implemented, (4) what the database models tell us about the data model. Explain as if I have never read code before.'],
        artifact:'A plain-English codebase summary you can reference in sprint planning',
        quiz:{q:'Why is it useful for a PM to navigate a codebase?',opts:['To replace engineers','To write code faster','To ask better questions and catch scope issues earlier','It is not useful for PMs'],correct:2,explain:'You do not need to write code. You need to read it like a map. PMs who can do this have more precise conversations and catch expensive misalignments before they ship.'}
      },
      {id:'p4l2',num:'4.2',time:'35 min',difficulty:'medium',
        title:'Pairing with Engineering',
        subtitle:'How to work alongside your tech lead without slowing them down or stepping on their toes.',
        concepts:[
          {name:'Spec Readiness',desc:'The bar a spec needs to clear before eng picks it up'},
          {name:'Proposing Changes',desc:'Structuring a change request so eng can move without back-and-forth'},
          {name:'Unblocking vs. Deciding',desc:'When PM should step in vs. when to let eng figure it out'},
          {name:'Async Communication',desc:'How to communicate with eng in a way that respects deep work'}
        ],
        example:{before:'You finish research, know what to build, write the spec. Three days after handing it to engineering there are 14 Slack messages. The spec described what to build but not the context the user operates in. That context changes how the flow needs to work.',after:'Spec sent then user context mapped explicitly in design review then edge cases documented before eng picks it up then 2 clarifying questions from eng (expected) then ships then measurable improvement in segment conversion.\nThe difference: the spec was grounded in actual user context before engineering touched it.'},
        exercise:'Pick a feature currently in development. Use Claude to draft a spec readiness checklist, an async update request to your tech lead, and a list of decisions you own vs. decisions you should defer to eng.',
        prompts:['I am working with my tech lead on [feature]. Please help me: (1) create a spec readiness checklist — what should be resolved before eng picks up a ticket, (2) draft an async status update request that respects their focus time, (3) list the decisions I own as PM vs. the ones I should defer to eng judgment.'],
        artifact:'A spec readiness checklist and an async eng communication template',
        quiz:{q:'What does a tech lead most need from their PM?',opts:['Daily status check-ins','Clear decisions made upfront so they can build without constant interruption','More detailed specs','Faster approvals'],correct:1,explain:'Engineers do their best work with clear direction and uninterrupted time. The PM job is to front-load the decisions so eng can move fast once they start.'}
      },
      {id:'p4l3',num:'4.3',time:'35 min',difficulty:'medium',
        title:'Pairing with Design',
        subtitle:'Give design feedback that is specific, actionable, and grounded in user needs — not personal taste.',
        concepts:[
          {name:'Design Review Structure',desc:'How to run a review that generates useful feedback, not opinion soup'},
          {name:'Needs vs. Solutions',desc:'Separating what users need from how design chose to solve it'},
          {name:'Research-Grounded Feedback',desc:'Using what you learned in testing to make feedback specific rather than subjective'},
          {name:'Approval vs. Sign-off',desc:'When PM approves direction vs. when design owns the final call'}
        ],
        example:{before:'You are standardizing UX across three products that have drifted apart over years. Design shows you three sets of comps. You have opinions based on instinct, not the user testing you just finished.',after:'Feedback structured before the design review:\nWhat research supports: this segment needs to see status information earlier in the flow — the comp addresses that well\nSpecific concern: The error state uses red text only. 15% of users are colorblind and this is a high-stakes surface. Can we add an icon?\nSigning off on: The overall flow sequence and the reconnect pattern\nNot signing off yet: Error states across all three surfaces until we align on an accessibility standard\nThe designer had something concrete to act on. Review took 25 minutes instead of 90.'},
        exercise:'Take a recent design comp you need to review. Use Claude to structure your feedback into: what user research supports, specific elements to reconsider, questions for the designer, and what you are signing off on.',
        prompts:['I need to review this design comp for [feature]. Help me structure my feedback: (1) what user needs does this address well, (2) what specific elements raise questions — framed in user terms not aesthetics, (3) questions to bring to the designer, (4) what I am prepared to sign off on as PM.'],
        artifact:'A structured design review document you can share with your designer',
        quiz:{q:'What makes design feedback useful vs. unhelpful?',opts:['Useful feedback is longer','Useful feedback is specific, tied to a user need or constraint — not personal aesthetic preference','Useful feedback praises more than it critiques','Useful feedback comes from the PM alone'],correct:1,explain:'"This feels busy" is a feeling. "The primary action is competing with 4 other elements at the same visual weight" is a specific problem a designer can solve.'}
      },
      {id:'p4l4',num:'4.4',time:'40 min',difficulty:'medium',
        title:'QA, Handoffs, and Getting to Launch',
        subtitle:'The last 20% of a feature is where PMs earn their keep — or let things slip.',
        concepts:[
          {name:'PM QA',desc:'What a PM should test before eng closes a ticket'},
          {name:'Edge Case Thinking',desc:'Using Claude to find the scenarios eng did not spec for'},
          {name:'Launch Readiness',desc:'The checklist that keeps you from discovering problems in production'},
          {name:'Participating in Code Review',desc:'What to look for in a pull request — scope, user impact, and what changed beyond the spec'}
        ],
        example:{before:'PM clicks through the happy path. Looks good. Ships. Three hours later a support ticket: what happens if I upload a file with a comma in the filename? Nobody thought of that.',after:'Claude generates 23 edge cases from the spec. PM tests 10 of them. Finds 2 bugs. They are fixed before launch. Support ticket never arrives.'},
        exercise:'Take a feature currently in QA or recently shipped. Use Claude to generate a comprehensive edge case list from the spec. Test the top 5 you are most worried about. Then find a recent pull request and ask Claude to explain what it changes — leave one meaningful comment.',
        prompts:['Here is the spec for [feature]: [paste]. Please generate: (1) a comprehensive edge case list grouped by category (empty states, error states, permissions, data limits, concurrent users), (2) the 5 most likely to cause a user-facing bug, (3) a PM QA checklist I can run before sign-off.\n\nAlso here is a recent PR diff: [paste]. Please explain what this changes in plain English and suggest 2-3 questions I should ask before it ships.'],
        artifact:'An edge case list, a PM QA checklist, and your first meaningful PR comment',
        quiz:{q:'What is the PM role in QA?',opts:['To replace QA engineers','To test the happy path only','To think about edge cases, user-facing errors, and scenarios the spec did not anticipate','To approve the final design'],correct:2,explain:'Eng QA tests functionality. PM QA tests reality — the weird inputs, the empty states, the users who do things in the wrong order. Both are needed.'}
      }
    ]
  },
  {
    id:'p5',num:'P5',title:'Read the Numbers',
    subtitle:'Pull answers from data, diagnose metric movements, and back your recommendations with evidence',
    lessons:[
      {id:'p5l1',num:'5.1',time:'35 min',difficulty:'easy',
        title:'Getting Answers from Data Without Writing SQL',
        subtitle:'Ask product questions in plain English — Claude handles the query.',
        concepts:[
          {name:'Natural Language to SQL',desc:'Ask in English; Claude writes the query'},
          {name:'Result Interpretation',desc:'Making sense of what the numbers actually say'},
          {name:'Iterative Analysis',desc:'Drilling from broad to specific across multiple questions'},
          {name:'Data Quality',desc:'Knowing when to trust a number and when to question it'}
        ],
        exercise:'Drop in a CSV or describe your data schema. Ask 3 real product questions you have been wanting answers to. Get answers, then drill into the most interesting one with 2 follow-up questions.',
        prompts:['Here is my dataset / schema: [describe or paste]. I have 3 product questions: (1) [question], (2) [question], (3) [question]. For each: write the SQL, show the result, interpret it in plain English, flag any data quality concerns.','§AGENT§I want to turn my most important recurring data question into a scheduled agent. The question: [describe]. Data source: [warehouse/schema]. Please: (1) write the SQL, (2) set up a daily schedule, (3) compare to previous day and flag changes, (4) deliver plain-English interpretation to Slack every morning.'],
        artifact:'A data findings document with answers to 3 real product questions',
        quiz:{q:'What is the most common mistake when interpreting data without a data analyst?',opts:['The charts look bad','Confusing correlation with causation — seeing a pattern and assuming it explains behavior','The queries are slow','You cannot share results'],correct:1,explain:'Two things moving together does not mean one caused the other. Good analysis generates alternative explanations and tests them before drawing conclusions.'}
      },
      {id:'p5l2',num:'5.2',time:'40 min',difficulty:'medium',
        title:'Diagnosing What Moved a Metric',
        subtitle:'Use structured root cause analysis to understand why a number went up or down.',
        concepts:[
          {name:'Metric Trees',desc:'Breaking a top-line number into the components that drive it'},
          {name:'Decomposition',desc:'Isolating which component actually moved'},
          {name:'Hypothesis Generation',desc:'Creating testable explanations before diving into data'},
          {name:'Evidence Matching',desc:'Connecting each hypothesis to data that confirms or denies it'}
        ],
        exercise:'Pick a metric that moved recently. Build a metric tree with Claude. Generate 5 hypotheses ranked by likelihood. Design a quick data check for the top 2.',
        prompts:['This metric moved: [metric] went [direction] by [amount] over [time period]. Please: (1) build a metric tree of components that roll up to this metric, (2) generate 5 ranked hypotheses for what drove the change, (3) for the top 2, tell me what data I need to confirm or deny them.','§AGENT§I want to automate this diagnosis. Build an agent that watches [metric] daily against a [7/30-day] baseline, triggers when movement exceeds [X%], then: (1) runs metric tree decomposition, (2) generates 3 ranked hypotheses, (3) writes SQL for the top hypothesis, (4) sends Slack alert with diagnostic in thread.'],
        artifact:'A metric diagnosis document with ranked hypotheses',
        quiz:{q:'What is a metric tree?',opts:['A chart of metric trends over time','A breakdown of a top-line metric into the components that drive it','A list of your team KPIs','A forecasting tool'],correct:1,explain:'A metric tree decomposes a top-line number into its drivers. It shows you where in the system something changed — which is the only way to diagnose a move without guessing.'}
      },
      {id:'p5l3',num:'5.3',time:'35 min',difficulty:'medium',
        title:'Writing Recommendations That Get Decisions',
        subtitle:'Turn analysis into a memo stakeholders trust and act on.',
        concepts:[
          {name:'Evidence Chain',desc:'The logical path from data to conclusion to recommendation'},
          {name:'Confidence Levels',desc:'Being honest about how strong your evidence actually is'},
          {name:'Preempting Objections',desc:'Addressing the counterargument before it is raised in the meeting'},
          {name:'Decision Trigger',desc:'What specifically you are asking the stakeholder to decide'}
        ],
        exercise:'Take the analysis from lesson 5.2. Write a recommendation memo. Ask Claude to play a skeptical VP and pressure-test it before you send it.',
        prompts:['Here is my analysis: [paste]. Help me write a recommendation memo: the recommendation in one sentence, 3 data points that support it, the strongest counterargument and my response, my confidence level and why, what would change my recommendation. Then critique it as a skeptical VP would.','§AGENT§I want an agent that generates a recommendation memo every Friday from [data source]. It should: (1) pull this week metrics, (2) compare to last week and 30-day trend, (3) identify the top movement and draft a memo with evidence and confidence level, (4) save to insights/[date].md and post a summary to [Slack channel].'],
        artifact:'A recommendation memo with data backing and pre-tested objections',
        quiz:{q:'What does stating a confidence level add to a recommendation?',opts:['It makes you look uncertain','It tells stakeholders how much to weight this input — and builds credibility through honesty','Recommendations should always sound certain','It is required by data teams'],correct:1,explain:'Stating uncertainty counterintuitively builds trust. "High confidence" on a big call signals that you know the difference between strong evidence and a hunch.'}
      },
      {id:'p5l4',num:'5.4',time:'40 min',difficulty:'advanced',
        title:'Designing Experiments You Can Actually Run',
        subtitle:'Set up tests that produce results you can trust — and know what to do when they come in.',
        concepts:[
          {name:'Experiment Design',desc:'The structure of a valid test — what you are changing and what you are measuring'},
          {name:'Sample Size',desc:'How many users you need before the result means anything'},
          {name:'Statistical Significance',desc:'What p < 0.05 actually means in plain English'},
          {name:'Decision Framework',desc:'Ship, iterate, or stop — how to decide from the result'}
        ],
        exercise:'Design a real test for a feature you are planning. Use Claude to calculate the sample size. Interpret a set of sample results. Decide: ship, iterate, or stop.',
        prompts:['I want to design a test for [feature]. Metric: [metric]. Baseline: [number]. Minimum detectable effect: [X%]. Please: (1) calculate the sample size I need, (2) estimate runtime given [traffic] users/week, (3) list 3 things that could invalidate this test, (4) generate sample results I can practice interpreting.','§AGENT§I want an experiment monitoring agent. Experiment: [describe]. Metric: [metric]. Baseline: [number]. MDE: [X%]. Every day it should: (1) query results from [data source], (2) calculate significance and projected time to significance, (3) flag guardrail metric changes, (4) send a Slack update with go/no-go recommendation when significance is reached.'],
        artifact:'An experiment design document and a results interpretation framework',
        quiz:{q:'What does statistical significance mean in plain English?',opts:['The result is important','The result is unlikely to be due to random chance — we have enough data to trust it','The sample size was large enough','The test ran long enough'],correct:1,explain:'Significance means: the probability this result happened by chance is below our threshold (usually 5%). It does not mean the effect is large — just that it is real.'}
      }
    ]
  },
  {
    id:'p6',num:'P6',title:'Communicate Clearly',
    subtitle:'Write docs, updates, and presentations that are faster to produce and easier to act on',
    lessons:[
      {id:'p6l1',num:'6.1',time:'35 min',difficulty:'easy',
        title:'A PRD Process That Improves Every Time',
        subtitle:'Build a PRD skill that learns your style and gets better with every use.',
        concepts:[
          {name:'PRD Structure',desc:'The sections that make a PRD actionable vs. aspirational'},
          {name:'Skill Iteration',desc:'Improving the skill based on each output — not starting over'},
          {name:'Style Calibration',desc:'Teaching Claude your writing preferences once, not every session'},
          {name:'Reuse',desc:'One skill that works for any feature — not a template you copy-paste'}
        ],
        exercise:'Build a PRD skill. Use it to generate a PRD for a real feature. Note 3 things to improve. Update the skill. Run it again. The second one should be noticeably better.',
        prompts:['Help me build a PRD SKILL.md. My PRDs should: [describe style and required sections]. Include: a template with placeholders, instructions for handling ambiguous inputs, examples of tone. Generate the full SKILL.md file.'],
        artifact:'A PRD skill and a sample PRD it generated',
        quiz:{q:'Why build a skill rather than save a prompt?',opts:['Skills are longer','A skill compounds — it improves each time and works for any future PRD without rewriting','Prompts expire','Skills are more secure'],correct:1,explain:'A saved prompt is static. A skill is a system. Every PRD you write teaches you what the skill should do differently — and you update it accordingly.'}
      },
      {id:'p6l2',num:'6.2',time:'30 min',difficulty:'easy',
        title:'Pressure-Testing Docs Before the Meeting',
        subtitle:'Surface the hard questions before your stakeholders do.',
        concepts:[
          {name:'Stakeholder Perspectives',desc:'Instructing Claude to think from a specific role — not generically'},
          {name:'Objection Surfacing',desc:'Finding the hard questions before the meeting does'},
          {name:'Pre-Mortem Thinking',desc:'Assuming the project failed and working backwards to why'},
          {name:'Revision Before Review',desc:'Arriving with objections already addressed'}
        ],
        exercise:'Take a doc you have written. Run it through 3 simulated reviews: VP Engineering (technical risk), a skeptical customer (value and disruption), your CFO (cost and ROI). Revise based on what surfaces.',
        prompts:['Here is my doc: [paste]. Review it three times from different perspectives: (1) VP Engineering — technical risk and scope, (2) a skeptical enterprise customer — value and disruption to their workflow, (3) CFO — cost, ROI, and opportunity cost. Give me the top 3 objections from each.'],
