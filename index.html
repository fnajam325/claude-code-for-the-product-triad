  {
    id:'p8',num:'P8',title:'Your Agent Stack',
    subtitle:'Build a set of autonomous agents that monitor your product, surface insights, and deliver them to your team — without you triggering anything',
    lessons:[
      {id:'p8l1',num:'8.1',time:'50 min',difficulty:'advanced',
        title:'The Metric Pulse Agent',
        subtitle:'A daily agent that queries your data, compares to baseline, flags anomalies, and delivers a morning digest to Slack — silence means nothing to investigate.',
        concepts:[
          {name:'Scheduled Queries',desc:'SQL that runs on a timer rather than when you manually trigger it'},
          {name:'Baseline Comparison',desc:'Comparing current values to 7-day and 30-day averages to define what normal looks like'},
          {name:'Anomaly Threshold',desc:'The boundary you set — when a metric crosses it the agent alerts rather than staying silent'},
          {name:'Signal vs. Noise',desc:'How to tune the threshold so the agent surfaces what matters without alerting on every fluctuation'}
        ],
        exercise:'Pick 3 metrics you check manually right now. Define the baseline and anomaly threshold for each. Build a metric pulse agent that queries all three daily, compares to baseline, and delivers a digest to Slack. Tune it until the first week of digests contains only signal worth acting on.',
        prompts:['§AGENT§I want to build a daily metric pulse agent. My 3 metrics are: (1) [metric, baseline, threshold], (2) [metric, baseline, threshold], (3) [metric, baseline, threshold]. Data source: [warehouse/schema]. Please: (1) write the SQL for each metric, (2) write the baseline comparison logic, (3) design the schedule and trigger, (4) write the Slack message format — one line per metric, normal or flagged, (5) define what the agent does when it cannot reach the data source.','§AGENT§When a metric crosses the threshold I want the agent to automatically run a metric tree decomposition and generate 2 ranked hypotheses. Add that logic so the alert arrives with analysis attached, not just a number.'],
        artifact:'A running daily metric pulse agent delivering a Slack digest every morning',
        quiz:{q:'What does it mean when your metric pulse agent stays silent for a week?',opts:['The agent is broken','The thresholds are too loose','Nothing moved outside normal range — silence is the signal that things are stable','You need more metrics'],correct:2,explain:'A well-tuned agent that stays silent is doing its job. If you get alerts every day your thresholds are too tight. If you never get alerts, verify the agent is actually running.'}
      },
      {id:'p8l2',num:'8.2',time:'55 min',difficulty:'advanced',
        title:'The Weekly Insight Report',
        subtitle:'An agent that pulls metric trends, ticket progress, and feedback themes every week — synthesizes them into a narrative and delivers it to your team automatically.',
        concepts:[
          {name:'Multi-Source Aggregation',desc:'Pulling from data warehouse, Jira, and feedback tools in a single agent run'},
          {name:'Narrative Synthesis',desc:'Turning numbers and themes into a story — what moved, why it likely moved, what to watch next week'},
          {name:'Versioned Artifacts',desc:'Saving each report as a dated file in your workspace so you have a running history to reference'},
          {name:'Delivery Routing',desc:'Sending different versions to different audiences — detailed file to workspace, summary to Slack'}
        ],
        exercise:'Build an agent that runs every Friday at 4pm. It should pull this week metrics, Jira ticket completions, and top feedback themes. Synthesize into a narrative report: what happened, what it means, what to watch. Save to reports/[date].md in your workspace. Send a 4-bullet summary to your team Slack channel. Tune the narrative prompt over three weeks until it sounds like something you would actually write.',
        prompts:['§AGENT§I want to build a weekly insight report agent. Runs every Friday at 4pm. Sources: (1) data warehouse — metrics: [list], (2) Jira project [name] — completed and in-progress tickets, (3) feedback source [name] — top themes. Please: (1) write the data pull for each source, (2) write the synthesis prompt — what moved, likely why, what to watch next week, (3) design the markdown report structure, (4) write the Slack summary — 4 bullets with a link to the full report, (5) set up versioned saving to reports/YYYY-MM-DD.md.','TUNING: Here are the last 3 weekly reports: [paste]. The narrative lists numbers without connecting them. Rewrite the synthesis prompt so the agent explains what the pattern across all sources means together — not each source in isolation.'],
        artifact:'A running weekly insight report agent — versioned reports in your workspace, summary in Slack every Friday',
        quiz:{q:'What separates a useful weekly report from a data dump?',opts:['It covers every metric','It is long and detailed','It explains what the pattern across sources means together — not just what the numbers are','It is automated'],correct:2,explain:'Listing numbers from three sources is a data dump. A useful report explains what those numbers mean together — engagement dropped while support tickets rose, which suggests the Tuesday deploy introduced friction. That narrative is what the agent should produce.'}
      },
      {id:'p8l3',num:'8.3',time:'50 min',difficulty:'advanced',
        title:'The Anomaly-to-Hypothesis Agent',
        subtitle:'When a metric crosses a threshold this agent runs a full diagnostic automatically — metric tree, ranked hypotheses, suggested data check — and delivers the analysis before you even knew there was a problem.',
        concepts:[
          {name:'Event-Triggered Agents',desc:'Agents that fire when a condition is met, not on a fixed schedule'},
          {name:'Auto-Diagnosis',desc:'The agent running the metric tree you would have done manually — decomposing the metric into its components automatically'},
          {name:'Hypothesis Ranking',desc:'Ordering hypotheses by likelihood based on the data pattern and direction of movement'},
          {name:'Human Escalation Path',desc:'The agent determines severity — you decide whether to act'}
        ],
        exercise:'Take the pulse agent from 8.1. Add an anomaly trigger: when any metric crosses its threshold the agent runs a full diagnostic. The output: metric tree decomposition, 3 ranked hypotheses, and the one SQL query that would most quickly confirm or deny the top hypothesis. Deliver as a Slack alert with the diagnostic in a thread so the channel is not overwhelmed.',
        prompts:['§AGENT§I want an anomaly-to-hypothesis agent that triggers when [metric] moves more than [X%] from the [7/30-day] baseline. When triggered: (1) decompose the metric into its components, (2) generate 3 hypotheses ranked by likelihood given the direction and magnitude of movement, (3) write the SQL that would confirm or deny the top hypothesis, (4) format as a Slack alert — anomaly summary first, full diagnostic in a thread, (5) include severity: investigate today / watch this week / informational.','§AGENT§Wire this to the pulse agent so when the pulse flags an anomaly it automatically hands off to the hypothesis agent. Design the handoff — what data passes between agents and how the hypothesis agent knows which metric to diagnose.'],
        artifact:'An anomaly-to-hypothesis agent chained to your pulse agent — alerts arrive with diagnostics attached',
        quiz:{q:'What is the key difference between a scheduled agent and an event-triggered agent?',opts:['Scheduled agents are more reliable','A scheduled agent runs at a fixed time. An event-triggered agent fires when a condition is met — it responds to what is happening, not the clock','Event-triggered agents are harder to build','There is no meaningful difference'],correct:1,explain:'The pulse agent runs every morning regardless of what changed. The anomaly agent fires only when something crosses a threshold. Both are needed — the pulse catches gradual drift, the trigger catches sudden moves.'}
      },
      {id:'p8l4',num:'8.4',time:'45 min',difficulty:'advanced',
        title:'Connecting Your Agent Stack',
        subtitle:'Wire your agents together into a coherent system — shared context, consistent outputs, and a clear picture of what is running and what to do when something breaks.',
        concepts:[
          {name:'Agent Registry',desc:'A single file documenting every agent you have running — what it watches, when it runs, where it delivers, how it fails'},
          {name:'Shared Context',desc:'All agents reading from the same project.md and strategy.md so outputs stay grounded in your current priorities'},
          {name:'Output Consistency',desc:'Every agent writing to a predictable location and format so you can build on their outputs'},
          {name:'Failure Handling',desc:'Silent failure is the worst outcome — every agent must either produce output or tell you it could not'}
        ],
        exercise:'Build an agent registry documenting every agent from this course. For each: what it monitors, when it runs, where it delivers, what it does when it fails. Wire two agents to share context — the weekly insight report should read from the anomaly log so it can reference this week anomalies in the narrative. Run your full stack in sequence and review the outputs for consistency.',
        prompts:['§AGENT§Build an agent registry for my full stack. My agents: [list each with purpose and schedule]. Please generate: (1) a registry markdown file — purpose, schedule, data sources, output location, failure behavior for each agent, (2) a shared context file all agents read before running — current product priorities from strategy.md, (3) a weekly health check prompt I can run to verify all agents are producing output and nothing has silently broken.','§AGENT§I want my weekly insight report to incorporate the anomaly log from my pulse agent. The report should reference anomalies from the past 7 days and their status — investigated, resolved, or still open. Design the handoff between agents and update the synthesis prompt to weave the anomaly context into the narrative.'],
        artifact:'A connected agent stack with a registry, shared context, and consistent output format — your full PM intelligence layer',
        quiz:{q:'Why does every agent need a documented failure behavior?',opts:['It is not that important','Silent failures are the most dangerous outcome — an agent that stops running without telling you is worse than no agent at all','It is required for compliance','Failure behavior is hard to build'],correct:1,explain:'An agent that silently fails gives you false confidence. You think you are being alerted to anomalies. You are not. Every agent needs to either produce output or tell you it could not — never disappear quietly.'}
      }
    ]
  }];

    {title:'Metric pulse agent',prompt:'§AGENT§I want to build a daily metric pulse agent. My metrics:\n(1) [metric] — baseline: [value], alert when: [X% change]\n(2) [metric] — baseline: [value], alert when: [X% change]\nData source: [warehouse/schema]. Please: (1) write the SQL for each, (2) write baseline comparison logic, (3) design daily schedule, (4) write Slack message — one line per metric, flagged if outside threshold, (5) write failure handler. Show me the full runnable agent file.'},
    {title:'Weekly insight report agent',prompt:'§AGENT§I want a weekly insight report agent that runs every Friday at 4pm. Sources: (1) data warehouse [metrics: list], (2) Jira [project key — completed, in-progress, blockers], (3) feedback tool [top themes]. Please: (1) write the data pull for each, (2) write synthesis prompt connecting all sources, (3) save as reports/YYYY-MM-DD.md, (4) post 4-bullet summary to Slack. Show me the full agent file.'},
    {title:'Anomaly-to-hypothesis agent',prompt:'§AGENT§I want an event-triggered agent for [metric]. Data source: [warehouse]. Baseline: [7/30-day avg]. Alert when movement exceeds [X%]. When triggered: (1) decompose metric into components, (2) generate 3 ranked hypotheses, (3) write the SQL to confirm the top hypothesis, (4) rate severity, (5) send Slack alert with diagnostic in thread. Show me the full agent file and how to chain it to a pulse agent.'},
    {title:'Agent registry and health check',prompt:'§AGENT§I have agents running: (1) [name — schedule, watches, delivers to], (2) [name — schedule, watches, delivers to]. Please generate: (1) a registry markdown file with purpose, schedule, sources, output, failure behavior, (2) shared context block from strategy.md, (3) weekly health check prompt to verify all agents are running, (4) wiring so weekly report reads from the anomaly log.'},
    {title:'Single metric Slack alert',prompt:'§AGENT§I want to connect [metric] to Slack with a daily alert. Data source: [SQL/API]. Baseline: [normal range]. Alert when: [condition]. Slack channel: [name]. Build the simplest version: query once a day, compare to baseline, post to Slack if outside threshold. Include setup instructions for cron.'}
  ]},
  {cat:'Workflow Setup',items:[
    {title:'Generate CLAUDE.md',prompt:'I want to create a CLAUDE.md file for my project. Ask me 5 questions to understand what to include, then generate the file in proper markdown format.'},
    {title:'Design my PM workspace',prompt:'Help me design a PM workspace in Claude Code. I work on [describe work]. I manage: [list activities]. Please: (1) design a folder structure, (2) explain what goes in each folder, (3) write a CLAUDE.md for the workspace, (4) tell me what 3 skills to build first.'},
    {title:'Build a custom skill',prompt:'Help me build a SKILL.md file for [task type]. The skill should: [describe inputs and desired outputs]. Include: a template with placeholders, instructions for handling ambiguous inputs, an example of the ideal output. Generate the full SKILL.md file.'},
    {title:'Build a repeatable workflow',prompt:'I want to build a repeatable workflow for [task]. My current process: [describe steps]. Please: (1) design a Claude Code workflow for each step, (2) write the trigger prompt, (3) identify which skills this workflow calls, (4) describe what the output should look like.'},

  ]}
];

let completed = JSON.parse(localStorage.getItem('cc4pm_v3') || '[]');
let currentView = 'home';
let currentLesson = null;

function markDone(id){
  if(!completed.includes(id)) completed.push(id);
  localStorage.setItem('cc4pm_v3',JSON.stringify(completed));
  updateProgress(); renderSidebar();
}

function updateProgress(){
  const total = curriculum.reduce((s,p)=>s+p.lessons.length,0);
  const done = completed.length;
  document.getElementById('progress-pct').textContent=`${done} / ${total}`;
  document.getElementById('progress-fill').style.width=`${(done/total)*100}%`;
}

function setNavActive(id){
  ['nl-home','nl-start','nl-prompts'].forEach(n=>{
    const el=document.getElementById(n);
    if(el) el.classList.toggle('active',n===id);
  });
}

function renderSidebar(){
  const nav=document.getElementById('parts-nav');
  nav.innerHTML=curriculum.map(part=>{
    const open=currentLesson&&part.lessons.some(l=>l.id===currentLesson.id);
    return `<div class="part-group ${open?'open':''}" id="pg-${part.id}">
      <div class="part-header" onclick="togglePart('${part.id}')">
        <span class="part-num">${part.num}</span>
        <span class="part-name">${part.title}</span>
        <span class="part-chevron">▶</span>
      </div>
      <div class="lessons-list">
        ${part.lessons.map(l=>{
          const done=completed.includes(l.id);
          const active=currentLesson?.id===l.id;
          return `<div class="lesson-item ${active?'active':''} ${done&&!active?'done':''}" onclick="openLesson('${l.id}');closeSidebar()">
            <div class="lesson-dot"></div>${l.num} ${l.title.length>32?l.title.slice(0,32)+'…':l.title}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  updateProgress();
}

function togglePart(id){ document.getElementById(`pg-${id}`).classList.toggle('open'); }

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

      <div class="breadcrumb">${breadcrumbs}</div>

}

function cleanPrompt(p){return p.startsWith('§AGENT§')?p.slice(7):p;}
function copyFromData(btn){
  var text=decodeURIComponent(btn.closest('.pl-card').dataset.copy);
  navigator.clipboard.writeText(text).then(function(){btn.textContent='COPIED';setTimeout(function(){btn.textContent='COPY';},1500);});
}

function showPromptLibrary(){
  currentView='prompts'; currentLesson=null;
  setNavActive('nl-prompts');
  document.getElementById('main-view').innerHTML=`
    ${topbar(`<span onclick="showHome()" style="cursor:pointer">Home</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Prompt library</span>`)}
    <div class="pl-wrap">
      <h1>Prompt library</h1>
      <p class="lesson-subtitle" style="margin-left:16px">${promptLibrary.reduce((s,g)=>s+g.items.length,0)} prompts organized by task. Copy any prompt directly into Claude Code.</p>
      <input class="pl-search" type="text" placeholder="Search prompts..." oninput="filterPrompts(this.value)" id="pl-search">
      <div class="pl-filters" id="pl-filters">
        <div class="pl-filter active" onclick="filterCategory(this,'All')">All</div>
        ${promptLibrary.map(g=>`<div class="pl-filter" onclick="filterCategory(this,'${g.cat}')">${g.cat}</div>`).join('')}
      </div>
      <div id="pl-content">
        ${promptLibrary.map(g=>`
          <div class="pl-group" data-cat="${g.cat}">
            <div class="pl-group-title">${g.cat}</div>
            ${g.items.map(item=>`
              <div class="pl-card" data-agent="${item.prompt.startsWith('§AGENT§') ? 1 : 0}" data-title="${item.title.toLowerCase()}" data-prompt="${item.prompt.toLowerCase()}" data-copy="${encodeURIComponent(cleanPrompt(item.prompt))}">
                <div class="pl-card-header">
                  <div>
                    ${item.prompt.startsWith('§AGENT§') ? '<span class="agent-lib-badge">&#9889; AGENT</span> ' : ''}<span class="pl-card-title">${item.title}</span>
                  </div>
                  <button class="pl-copy" onclick="copyFromData(this)">COPY</button>
                </div>
                <div class="pl-card-full">${cleanPrompt(item.prompt)}</div>
              </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>`;
  renderSidebar();
}

function filterCategory(el, cat){
  document.querySelectorAll('.pl-filter').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pl-group').forEach(g=>{
    g.style.display=(cat==='All'||g.dataset.cat===cat)?'block':'none';
  });
}

function filterPrompts(q){
  const lq=q.toLowerCase();
  document.querySelectorAll('.pl-card').forEach(c=>{
    const match=c.dataset.title.includes(lq)||c.dataset.prompt.includes(lq);
    c.style.display=match?'flex':'none';
  });
  document.querySelectorAll('.pl-group').forEach(g=>{
    const visible=[...g.querySelectorAll('.pl-card')].some(c=>c.style.display!=='none');
    g.style.display=visible?'block':'none';
  });
}

function copyPlPrompt(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='COPIED';
    setTimeout(()=>btn.textContent='COPY',1500);
  });
}

function diffBadge(d){
  if(d==='easy') return '<span class="badge badge-easy">Beginner</span>';
  if(d==='medium') return '<span class="badge badge-medium">Intermediate</span>';
  return '<span class="badge badge-advanced">Advanced</span>';
}

function openLesson(id){
  const part=curriculum.find(p=>p.lessons.some(l=>l.id===id));
  const lesson=part.lessons.find(l=>l.id===id);
  currentView='lesson'; currentLesson=lesson;
  setNavActive('');
  const all=curriculum.flatMap(p=>p.lessons);
  const gi=all.indexOf(lesson);
  const prev=all[gi-1], next=all[gi+1];
  const done=completed.includes(id);

  document.getElementById('main-view').innerHTML=`
    ${topbar(
      `<span onclick="showHome()" style="cursor:pointer">Home</span><span class="breadcrumb-sep">›</span><span>${part.num}: ${part.title}</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${lesson.num}</span>`,
      `${prev?`<button class="btn btn-ghost" onclick="openLesson('${prev.id}')">← Prev</button>`:''}${next?`<button class="btn btn-ghost" onclick="openLesson('${next.id}')">Next →</button>`:''}`
    )}
    <div class="content-wrap">
      <div class="lesson-meta">
        <span class="lesson-tag">${part.num}: ${part.title}</span>
        <span class="lesson-num-tag">Lesson ${lesson.num}</span>
        <div class="lesson-badges">
          <span class="badge badge-time">⏱ ${lesson.time}</span>
          ${diffBadge(lesson.difficulty)}
          ${done?'<span style="font-size:11px;color:var(--green);font-family:IBM Plex Mono,monospace;font-weight:600;">✓ Complete</span>':''}
        </div>
      </div>

      <h1>${lesson.title}</h1>
      <p class="lesson-subtitle">${lesson.subtitle}</p>

      <div class="section">
        <div class="section-label">Key concepts</div>
        <div class="concept-grid">
          ${lesson.concepts.map(c=>`<div class="concept-card"><div class="concept-name">${c.name}</div><p class="concept-desc">${c.desc}</p></div>`).join('')}
        </div>
      </div>

      ${lessonExamples[lesson.id]?`
      <div class="section">
        <div class="section-label">Before and after</div>
        <div class="example-box">
          <div class="example-cols">
            <div class="example-side before">
              <div class="example-side-label">Before</div>
              <div class="example-content">${lessonExamples[lesson.id].before.replace(/\\n/g,'\n')}</div>
            </div>
            <div class="example-side after">
              <div class="example-side-label">After</div>
              <div class="example-content">${lessonExamples[lesson.id].after.replace(/\\n/g,'\n')}</div>
            </div>
          </div>
        </div>
      </div>`:''}

      <div class="section">
        <div class="section-label">Exercise</div>
        <div class="exercise-box">
          <div class="exercise-label">Your mission</div>
          <p class="exercise-text">${lesson.exercise}</p>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Starter prompts</div>
        ${lesson.prompts.map(function(p){
          var isAgent=p.startsWith('§AGENT§');
          var display=isAgent?p.slice(7):p;
          var cls=isAgent?'prompt-block agent':'prompt-block';
          var badge=isAgent?'<div style="display:inline-flex;align-items:center;gap:5px;background:#1D9E75;border-radius:4px;padding:3px 10px;font-size:9px;font-weight:700;color:#fff;letter-spacing:0.1em;margin-bottom:10px">&#9889; AGENT PROMPT</div><br>':'';
          return '<div class="'+cls+'">'+badge+display+'<button class="copy-btn" onclick="navigator.clipboard.writeText(decodeURIComponent(\''+encodeURIComponent(display)+'\'))">COPY</button></div>';
        }).join('')}
      </div>

      <div class="section">
        <div class="section-label">Artifact you will produce</div>
        <div class="artifact-box">
          <div class="artifact-icon">📄</div>
          <div>
            <div class="artifact-label">Take-away</div>
            <p class="artifact-name">${lesson.artifact}</p>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Check your understanding</div>
        <div class="quiz-section" id="quiz-${id}">
          <div class="quiz-q">${lesson.quiz.q}</div>
          <div class="quiz-options">
            ${lesson.quiz.opts.map((o,i)=>`<div class="quiz-opt" onclick="answerQuiz('${id}',${i},${lesson.quiz.correct},\`${lesson.quiz.explain.replace(/`/g,'\\`')}\`)">${o}</div>`).join('')}
          </div>
          <div class="quiz-feedback" id="qf-${id}"></div>
        </div>
      </div>
    </div>

    <div class="complete-bar">
      <span class="complete-hint">${done?'✓ Lesson complete — nice work.':'Finish the exercise, then mark this lesson done.'}</span>
      <button class="btn btn-primary" onclick="markDone('${id}');this.textContent='✓ Complete';this.style.background='var(--green)';" ${done?'disabled style="background:var(--green);cursor:default;"':''}>
        ${done?'✓ Complete':'Mark complete →'}
      </button>
    </div>`;

  renderSidebar();
  window.scrollTo(0,0);
}

function answerQuiz(id,chosen,correct,explain){
  const c=document.getElementById(`quiz-${id}`);
  const opts=c.querySelectorAll('.quiz-opt');
  const fb=document.getElementById(`qf-${id}`);
  opts.forEach((o,i)=>{
    o.style.pointerEvents='none';
    if(i===correct) o.classList.add('correct');
    else if(i===chosen&&chosen!==correct) o.classList.add('wrong');
  });
  fb.textContent=(chosen===correct?'✓ Correct. ':'✗ Not quite. ')+explain;
  fb.className='quiz-feedback '+(chosen===correct?'ok':'err');
}

function copyPrompt(btn,text){
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='COPIED';setTimeout(()=>btn.textContent='COPY',1500);});
}

showHome();
